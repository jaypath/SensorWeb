; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[env]
; LovyanGFX: use GitHub master for gpio_hal_func_sel fix (ESP32 core 3.3.x); no patch needed
;platform = espressif32@6.5.0
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.35/platform-espressif32.zip
;platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32dev
framework = arduino
; Equal OTA slots: 0x1F0000 each @ 0x10000 / 0x200000 (same layout as partitions_wt32sc01_ota_no_spiffs.csv on servers)
board_build.partitions = partitions_ota_no_spiffs.csv
board_build.mcu = esp32
board_build.f_cpu = 240000000L
upload_speed = 921600
monitor_speed = 115200
; CMN CA bundle (~68KB flash) for HTTPS (TimeAPI, weather, etc.); inherited by all envs unless overridden
board_build.sdkconfig.defaults =
	CONFIG_MBEDTLS_CERTIFICATE_BUNDLE=y
	CONFIG_MBEDTLS_CERTIFICATE_BUNDLE_DEFAULT_CMN=y
; Use larger partition scheme if you have 4MB flash (gives ~1.9MB app space instead of 1.25MB)
; Uncomment the line below if your ESP32 has 4MB flash:
;board_build.partitions = default_4MB.csv
; Or use huge_app partition for maximum app space (if you don't need OTA):
;board_build.partitions = huge_app.csv
lib_deps = 
	SPI
	bblanchon/ArduinoJson@^7.0.3
	paulstoffregen/Time@^1.6.1
	arduino-libraries/NTPClient@^3.2.1
build_flags = 
	;-D _USEDETAILEDSTATUSWEBHTML=1 ;add details about web traffic to status page
	;-D _USEDETAILEDWEATHERWEBHTML=1 ;add detailed weather information to weather page
	-D TIMEZERO=1735689600 ;time zero is 2025-01-01 00:00:00. This is the earliest time that can be considered valid for sensor responses and alivesince.
	-D WDT_TIMEOUT_MS=120000
	-D _USEUDP=49157 ;UDP port for data sending/receiving
	-D _USEUDP_MULTICAST=239,187,42,17 ;just an arbitrary multicast group that is within the private/local use range
	;-D _USEUDP_MULTICAST=255,255,255,255 ;broadcast to all devices on the network
	-D _USEADCATTEN=ADC_6db ;ADC_11db, ADC_6db, or ADC_2_5db or ADC_0db (for esp32 adc)
	-D _USEADCBITS=10 ;10, 11, or 12 (for esp32 adc)
	-D _USE_CERT_BUNDLE=1 ; use ESP-IDF CMN x509 bundle in SendHTTPMessage (setCacert "bundle")
	-D _USENETWORKMONITOR=0 ; set to 1 to enable network monitor (compiles NetworkMonitor.cpp + ESP32Ping)
	-Os ; Optimize for size (smallest binary)
	-ffunction-sections ; Place each function in its own section
	-fdata-sections ; Place each data item in its own section
	-Wl,--gc-sections ; Remove unused sections
	-D ARDUINO_USB_CDC_ON_BOOT=0 ; Disable USB CDC if not needed
	-D CORE_DEBUG_LEVEL=0 ; Disable debug output
	; Disable unused ESP-IDF features to save space
	-D CONFIG_LOG_DEFAULT_LEVEL=0 ; Minimal logging
	-D CONFIG_LOG_MAXIMUM_LEVEL=0 ; No logging
	-D CONFIG_COMPILER_OPTIMIZATION_SIZE=y ; Optimize for size
	-D CONFIG_ESP32_WIFI_AMPDU_TX_ENABLED=0 ; Disable AMPDU TX if not needed
	-D CONFIG_ESP32_WIFI_AMPDU_RX_ENABLED=0 ; Disable AMPDU RX if not needed
	-D CONFIG_APP_PROJECT_VER=\"9.4.16\" ; firmware version (esp_app_desc, x.xx.xx) — edit here only
	;9.4.0 - version update with numerous updates to sensors, network monitor, status page, and other features.
	;9.4.1 - ping rtt display on main  page
	;9.4.2 - fixed a bug in which sensors were not added at boot correctly, added networkmonitor types to sensor types for flagging and searching
	;9.4.3 - fixed a bug in which graphics displayed wifi not connecting correctly (when it was), server logs when firmware update completes, multiple bug fixes.
	;9.4.4 - fixed graphics display so that all sensors are not displayed
	;9.4.5 - fixed a bug in the wifi AP path, where it connected/disconnected incorrectly when the wifi was not connected.
	;9.4.6 - Reduced IGMP reporting interval to 60s. Changed status page to display more web based info
	;9.4.7 - updated firmware request reporting
	;9.4.8 - focused ota update
	;9.4.9 - Fixed a wifi reconnect issue that prevented reconnecting to the wifi after WiFi down
	;9.4.10 - Fixed a bug in which the network monitor was not working correctly, added ping success rate to the status page, and added smoke and haze weather types.
	;9.4.11 - added the ability to manually add a device.
	;9.4.12 - fixed a bug in which hybrid server/sensors expired their own sensors, chunked page loading, and other bug fixes.
	;9.4.14 - Join strongest BSSID for configured SSID at connect; re-evaluate every 30 min (not persisted).
	;9.4.15 - status banner updated and reduced blocking gsheet/weather functions; updated to async messaging for faster loop execution.
	;9.4.16 - added weatherlite type and environment; updated to async messaging for faster loop execution.
build_src_filter =
	+<*>
	-<NetworkMonitor.cpp>
build_unflags = 
	-O2 ; Remove default optimization
	-g ; Remove debug symbols (adds significant size)


[env:wthrbase_USB]
board = um_tinys3
board_build.mcu = esp32s3
; Ensure cert bundle is built and linked (fixes undefined reference to x509_crt_imported_bundle_bin_*)
board_build.sdkconfig.defaults = 
	${env.board_build.sdkconfig.defaults}
board_build.partitions = partitions_wt32sc01_ota_no_spiffs.csv
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
lib_deps = 
	SPI
	bblanchon/ArduinoJson@^7.0.3
	https://github.com/lovyan03/LovyanGFX.git
	paulstoffregen/Time@^1.6.1
	arduino-libraries/NTPClient@^3.2.1
build_flags = 
	${env.build_flags}
	-DBOARD_HAS_PSRAM
	-DCONFIG_SPIRAM_SUPPORT=1
	-mfix-esp32-psram-cache-issue
	-D PLUS=1
	-D LV_MEM_SIZE="(64U * 1024U)"
	-D _USE_CERT_BUNDLE=1 ;use the ESP-IDF cert bundle. The actual value is irrelevant, as it is only used to define the USE_CERT_BUNDLE macro.
	-D WEATHER_OPTIMIZATION_ENABLED=1
	-D PARALLEL_REQUESTS_ENABLED=1
	-D WEATHER_CACHE_SIZE=3
	-D MAX_RETRY_ATTEMPTS=3
	-D _MYTYPE=100
	-D _USESPI=1
	-D _USETFT=1
	-D _USEWEATHER=1
; _MONITOROUTDOORBATTERYSENSORS: track outside battery_li on weather TFT; optional with _USEWEATHER
	-D _MONITOROUTDOORBATTERYSENSORS=1
	-D _USESDCARD=1
	-D _ISHVACSERVER=1
	-D _IS_SERVER_HUB=1
	-D NUMDEVICES=50
	-D NUMSENSORS=100
;	-D _MYDEVICENAME=\"PleasantBackupServer\"
;	-D _USEGSHEET=1
;    -D _USESERIAL=115200 ;use serial port for debugging

; Device roles (independent; not mutually exclusive). See src/device_roles.hpp.
;   _HAS_LOCAL_SENSORS=1 — local sensors, ReadData, send upstream
;   _IS_SERVER_HUB=1     — hub: collect remote data, ping expired devices, broadcast presence
; Base [env] sets _IS_SERVER_HUB=1. Sensor nodes override with _HAS_LOCAL_SENSORS=1 and _IS_SERVER_HUB=0.
; Hybrid: _HAS_LOCAL_SENSORS=1 _IS_SERVER_HUB=1 _MYTYPE=100
;   _USENETWORKMONITOR=1 — compile NetworkMonitor.cpp and add ESP32Ping (see MainServer envs).
;   Default build_src_filter excludes NetworkMonitor.cpp; MainServer envs override with +<*>.
;   RSSI tracking (snsType 80) is universal and lives in STRUCT_CORE I via updateRSSI() in server.cpp.
;   Network monitor snsTypes 81-89 trigger tests on demand when ReadData() runs for that sensor.
; _NETWORKMONITOR_DOWNLOAD_KB: Cloudflare download size in KB when _USENETWORKMONITOR=1 (default 100).

; Type-101 weather package consumer (no NOAA). Same hardware as wthrbase; SD required.
