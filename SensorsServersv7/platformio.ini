board_build.f_cpu = 240000000L
build_flags = 
	${env.build_flags}
	-DBOARD_HAS_PSRAM
	-DCONFIG_SPIRAM_SUPPORT=1
	-mfix-esp32-psram-cache-issue
	-D _HAS_LOCAL_SENSORS=1
	-D NUMDEVICES=10
	-D NUMSENSORS=1
	-D _SENSORHISTORYSIZE=10
	-D _MYDEVICENAME=\"SpaceClock\"
	-D _MYTYPE=98
	-D _SENSORNUM=1
	-D _SENSORTYPES={98}
	-D _SNSPINS={-9999}
	-D _POWERPINS={-9999}
	-D _FLAGSTATES={0b00000000}
	-D _INTERVAL_POLL={3600}
	-D _INTERVAL_SEND={3600}
	-D _LIMIT_MAX={4000000000} ;arbitrary high value
	-D _LIMIT_MIN={0}
	-D _SENSORNAMES={\"Clock\"}
	-D _ISCLOCK480X480=1
	-D _USETFT=1

build_unflags =;unbuild flags for ADC
	-D _USEADCATTEN ;ADC_11db, ADC_6db, or ADC_2_5db or ADC_0db (for esp32 adc)
	-D _USEADCBITS ;10, 11, or 12 (for esp32 adc)
lib_deps = 
	${env.lib_deps}
	lovyan03/LovyanGFX@^1.2.0


